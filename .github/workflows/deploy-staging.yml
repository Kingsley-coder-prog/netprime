# .github/workflows/deploy-staging.yml
# Triggered when code is pushed to the develop branch
# Deploys to staging environment after CI passes

name: Deploy — Staging

on:
  push:
    branches: [develop]

jobs:
  # ── CI must pass first ─────────────────────────────────────────
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.STAGING_API_URL || 'https://netprime-gateway-staging.onrender.com' }}
          VITE_TMDB_TOKEN: ${{ secrets.VITE_TMDB_TOKEN }}

  # ── Deploy backend to Render staging ──────────────────────────
  deploy-backend-staging:
    name: Deploy Backend → Staging
    runs-on: ubuntu-latest
    needs: build-check # Only runs if build-check passes

    steps:
      - name: Trigger Render staging deployment
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
            | jq '.'

      - name: Wait for deployment to start
        run: sleep 10

      - name: Confirm deployment triggered
        run: echo "✅ Staging backend deployment triggered on Render"

  # ── Frontend deploys automatically via Vercel ─────────────────
  notify-frontend:
    name: Frontend Deployment
    runs-on: ubuntu-latest
    needs: build-check

    steps:
      - name: Confirm Vercel will auto-deploy
        run: |
          echo "✅ Vercel will automatically deploy frontend from develop branch"
          echo "   Staging URL: https://netprime-staging.vercel.app"
