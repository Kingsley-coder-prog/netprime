# backend/infra/docker/docker-compose.yml
# Production docker-compose — uses MongoDB Atlas + Upstash (no local DB containers)
# Run from the backend/ directory: docker-compose -f infra/docker/docker-compose.yml up -d

version: '3.9'

# ---- Shared configuration ----
x-common-service: &common-service
  build:
    context: ../..
    dockerfile: infra/docker/Dockerfile
  env_file: ../../.env
  restart: unless-stopped
  networks:
    - netprime-net

x-common-env: &common-env
  NODE_ENV: production

services:

  # ================================================================
  # GATEWAY — Single entry point, port 3000
  # ================================================================
  gateway:
    <<: *common-service
    container_name: netprime-gateway
    ports:
      - "3000:3000"
    environment:
      <<: *common-env
      PORT: 3000
    command: node gateway/index.js
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ================================================================
  # AUTH SERVICE — Port 3001
  # ================================================================
  auth-service:
    <<: *common-service
    container_name: netprime-auth
    ports:
      - "3001:3001"
    environment:
      <<: *common-env
      AUTH_SERVICE_PORT: 3001
    command: node services/auth-service/index.js

  # ================================================================
  # USER SERVICE — Port 3002
  # ================================================================
  user-service:
    <<: *common-service
    container_name: netprime-user
    ports:
      - "3002:3002"
    environment:
      <<: *common-env
      USER_SERVICE_PORT: 3002
    command: node services/user-service/index.js

  # ================================================================
  # MOVIE SERVICE — Port 3003
  # ================================================================
  movie-service:
    <<: *common-service
    container_name: netprime-movie
    ports:
      - "3003:3003"
    environment:
      <<: *common-env
      MOVIE_SERVICE_PORT: 3003
    command: node services/movie-service/index.js

  # ================================================================
  # STREAM SERVICE — Port 3004
  # ================================================================
  stream-service:
    <<: *common-service
    container_name: netprime-stream
    ports:
      - "3004:3004"
    environment:
      <<: *common-env
      STREAM_SERVICE_PORT: 3004
    command: node services/stream-service/index.js

  # ================================================================
  # UPLOAD SERVICE — Port 3005
  # ================================================================
  upload-service:
    <<: *common-service
    container_name: netprime-upload
    ports:
      - "3005:3005"
    environment:
      <<: *common-env
      UPLOAD_SERVICE_PORT: 3005
    command: node services/upload-service/index.js

  # ================================================================
  # NOTIFICATION SERVICE — Port 3006
  # ================================================================
  notification-service:
    <<: *common-service
    container_name: netprime-notification
    ports:
      - "3006:3006"
    environment:
      <<: *common-env
      NOTIFICATION_SERVICE_PORT: 3006
    command: node services/notification-service/index.js

  # ================================================================
  # TRANSCODER WORKER — No port (background worker)
  # ================================================================
  transcoder-worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: netprime-transcoder
    env_file: ../../.env
    environment:
      <<: *common-env
    restart: unless-stopped
    networks:
      - netprime-net
    command: node workers/transcoder/index.js
    # Workers need more memory for FFmpeg
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ================================================================
  # THUMBNAIL WORKER — No port (background worker)
  # ================================================================
  thumbnail-worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: netprime-thumbnail
    env_file: ../../.env
    environment:
      <<: *common-env
    restart: unless-stopped
    networks:
      - netprime-net
    command: node workers/thumbnail-generator/index.js

networks:
  netprime-net:
    driver: bridge