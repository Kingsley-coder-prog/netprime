# Load balancer + SSL config
upstream cinemax_gateway {
    least_conn;  # Route to least busy instance
    server gateway_1:3000;
    server gateway_2:3000;
    server gateway_3:3000;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Gzip
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # API - proxy to gateway cluster
    location /api/ {
        proxy_pass         http://cinemax_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Large body for uploads (handled by upload-service)
        client_max_body_size 4G;
    }

    # Frontend static files
    location / {
        root  /var/www/cinemax/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;  # SPA fallback
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|gif|ico|svg|woff2)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
        }
    }
}